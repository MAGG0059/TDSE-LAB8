spring.application.name=login-service
server.port=8080
server.servlet.session.timeout=30m

spring.datasource.url=${DB_URL:jdbc:postgresql://postgres:5432/login_db}
spring.datasource.username=${DB_USERNAME:login_user}
spring.datasource.password=${DB_PASSWORD:changeit}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false

spring.session.store-type=jdbc
spring.session.jdbc.initialize-schema=always

frontend.url=${FRONTEND_URL:https://manueltdse.duckdns.org}

logging.level.com.secure.login=INFO
logging.level.org.springframework.security=INFO