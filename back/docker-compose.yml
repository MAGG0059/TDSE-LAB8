version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: postgres
    environment:
      POSTGRES_DB: login_db
      POSTGRES_USER: login_user
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeit}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - backend-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U login_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  login-service:
    build: .
    container_name: login-service
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/login_db
      DB_USERNAME: login_user
      DB_PASSWORD: ${DB_PASSWORD:-changeit}
      FRONTEND_URL: https://manueltdse.duckdns.org
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - backend-network
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: nginx-backend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
    depends_on:
      - login-service
    networks:
      - backend-network
    restart: unless-stopped

networks:
  backend-network:
    driver: bridge

volumes:
  postgres_data: